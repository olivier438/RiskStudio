<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GRC Risk Studio v3.2</title>
    <style>
        :root { --primary: #2563eb; --ot-color: #f59e0b; --it-color: #3b82f6; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-bar { 
            background: white; padding: 20px; border-radius: 12px; 
            display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; 
            align-items: center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
        }
        
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; outline: none; }
        .search-input { flex-grow: 1; min-width: 300px; }

        .btn { padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .btn-import { background: #64748b; color: white; }
        .btn-pdf { background: var(--primary); color: white; }
        .btn-pdf:disabled { background: #cbd5e1; cursor: not-allowed; }

        .risk-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        .risk-table th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 12px; color: #64748b; border-bottom: 2px solid var(--border); }
        .risk-table td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
        .selected-row { background: #eff6ff !important; }

        .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin: 2px; border: 1px solid rgba(0,0,0,0.05); }
        .tag-sector { background: #e0e7ff; color: #4338ca; cursor: pointer; }
        .tag-sector:hover { background: #c7d2fe; }
        .tag-regul { background: #f1f5f9; color: #475569; display: block; width: fit-content; }
        
        .impact-badge { padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 11px; }
        .high { background: #fee2e2; color: #991b1b; }

        @media print {
            .search-bar, .btn, .no-print, #counter, h1 { display: none !important; }
            body { background: white; padding: 0; }
            tr:not(.selected-row) { display: none !important; }
            .selected-row { display: table-row !important; background: white !important; }
            .risk-table { border: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛡️ GRC Risk Studio <small>v3.2</small></h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div id="counter" style="font-size: 14px; color: #64748b;">0 risques sélectionnés</div>
            <button class="btn btn-pdf" id="pdfBtn" onclick="window.print()" disabled>📄 Générer Rapport (PDF)</button>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Recherche globale..." oninput="filterRisks()">
        
        <select id="filterType" onchange="filterRisks()">
            <option value="">Tout (IT & OT)</option>
            <option value="IT">💻 Environnement IT</option>
            <option value="OT">⚙️ Environnement OT</option>
        </select>

        <select id="filterSecteur" onchange="filterRisks()">
            <option value="">Tous les Secteurs</option>
            <option value="Finance">Finance</option>
            <option value="Industrie">Industrie</option>
            <option value="Santé">Santé</option>
            <option value="Énergie">Énergie</option>
        </select>

        <button class="btn btn-import" onclick="document.getElementById('csvInput').click()">📂 Charger CSV</button>
        <input type="file" id="csvInput" style="display:none" accept=".csv" onchange="handleCSV(this)">
    </div>

    <table class="risk-table">
        <thead>
            <tr>
                <th class="no-print" width="40"><input type="checkbox" onclick="toggleAll(this)"></th>
                <th width="35%">Risque & Scénario</th>
                <th width="15%">Secteurs</th>
                <th width="15%">Catégorie</th>
                <th width="20%">Conformité</th>
                <th width="5%">Impact</th>
            </tr>
        </thead>
        <tbody id="riskBody">
            <tr><td colspan="6" style="text-align:center; padding:50px;">En attente du fichier CSV...</td></tr>
        </tbody>
    </table>
</div>

<script>
    let allRisks = [];
    let selectedIds = new Set();

    function handleCSV(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split('\n');
            allRisks = [];
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const cols = rows[i].split(';'); 
                if (cols.length >= 10) {
                    allRisks.push({
                        id: cols[0], titre: cols[1], cat: cols[2], 
                        secteurs: cols[3].split(',').map(s => s.trim()), 
                        menace: cols[4], dic: cols[5], iso: cols[6], 
                        dora: cols[7], nis2: cols[8], impact: cols[9], 
                        scenario: cols[10], mesures: cols[11],
                        fullText: rows[i].toLowerCase()
                    });
                }
            }
            displayRisks(allRisks);
        };
        reader.readAsText(file, 'UTF-8');
    }

    function checkIfOT(r) {
        const text = (r.cat + " " + r.titre + " " + r.scenario).toUpperCase();
        const keywordsOT = ["SCADA", "PLC", "AUTOMATE", "INDUSTRIEL", "USINE", "CAPTEUR", "BIOMÉDICAL", "MODBUS", "PROFINET", "GTC", "GTB"];
        // Utilise \b pour éviter de matcher "mOTs" ou "pilOTe"
        return keywordsOT.some(word => text.includes(word)) || /\bOT\b/.test(text);
    }

    function displayRisks(risks) {
        const body = document.getElementById('riskBody');
        body.innerHTML = '';
        risks.forEach(r => {
            const isSelected = selectedIds.has(r.id);
            const isOT = checkIfOT(r);
            const row = document.createElement('tr');
            if (isSelected) row.classList.add('selected-row');

            row.innerHTML = `
                <td class="no-print"><input type="checkbox" class="risk-check" ${isSelected ? 'checked' : ''} onclick="toggleSelect('${r.id}', this)"></td>
                <td>
                    <span class="tag" style="background:${isOT?'#f59e0b':'#3b82f6'}; color:white; font-size:9px;">${isOT?'⚙️ OT':'💻 IT'}</span>
                    <div style="font-weight: bold; margin-top:4px;">${r.id} - ${r.titre}</div>
                    <div style="color: #64748b; font-size: 11px; margin-top:4px;">${r.scenario}</div>
                    <div style="margin-top:8px; color: #059669; font-weight: 500; font-size:11px;">✅ ${r.mesures}</div>
                </td>
                <td>${r.secteurs.map(s => `<span class="tag tag-sector" onclick="quickFilterSector('${s}')">${s}</span>`).join('')}</td>
                <td><strong>${r.cat}</strong><br><small>${r.menace}</small></td>
                <td>
                    <span class="tag tag-regul">ISO ${r.iso}</span>
                    <span class="tag tag-regul">DORA ${r.dora}</span>
                    <span class="tag tag-regul">NIS2 ${r.nis2}</span>
                </td>
                <td><span class="impact-badge ${r.impact >= 4 ? 'high' : ''}">${r.impact}/5</span></td>
            `;
            body.appendChild(row);
        });
    }

    function toggleSelect(id, cb) {
        cb.checked ? selectedIds.add(id) : selectedIds.delete(id);
        cb.closest('tr').classList.toggle('selected-row');
        updateUI();
    }

    function toggleAll(master) {
        document.querySelectorAll('.risk-check').forEach(cb => {
            const row = cb.closest('tr');
            const id = row.querySelector('div').innerText.split(' - ')[0];
            cb.checked = master.checked;
            master.checked ? selectedIds.add(id) : selectedIds.delete(id);
            row.classList.toggle('selected-row', master.checked);
        });
        updateUI();
    }

    function updateUI() {
        document.getElementById('counter').innerText = `${selectedIds.size} sélectionnés`;
        document.getElementById('pdfBtn').disabled = selectedIds.size === 0;
    }

    function quickFilterSector(s) {
        document.getElementById('filterSecteur').value = s;
        filterRisks();
    }

    function filterRisks() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const sector = document.getElementById('filterSecteur').value.toLowerCase();
        const type = document.getElementById('filterType').value;

        const filtered = allRisks.filter(r => {
            const matchTerm = r.fullText.includes(term);
            const matchSector = sector === "" || r.secteurs.some(s => s.toLowerCase().includes(sector));
            const isOT = checkIfOT(r);
            const matchType = type === "" || (type === "OT" ? isOT : !isOT);
            return matchTerm && matchSector && matchType;
        });
        displayRisks(filtered);
    }
</script>
</body>
</html>
